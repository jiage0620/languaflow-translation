    <script>
        const STORAGE_KEYS = {
            MEMORY: 'linguaflow_translation_memory',
            CORPUS: 'linguaflow_translation_corpus',
            API_CONFIG: 'linguaflow_translation_api_config'
        };

        const LANGUAGES = [
            { code: 'zh', name: '中文', baiduCode: 'zh' },
            { code: 'en', name: '英语', baiduCode: 'en' },
            { code: 'ja', name: '日语', baiduCode: 'jp' },
            { code: 'ko', name: '韩语', baiduCode: 'kor' }
        ];

        const INDUSTRIES = [
            { value: 'it', label: 'IT技术' },
            { value: 'education', label: '教育培训' },
            { value: 'medical', label: '医疗健康' },
            { value: 'general', label: '通用领域' }
        ];

        let currentPage = 'translate';

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');
            
            toastMessage.textContent = message;
            
            const icons = {
                success: 'fa-check-circle text-success',
                error: 'fa-times-circle text-danger',
                warning: 'fa-exclamation-circle text-warning',
                info: 'fa-info-circle text-primary'
            };
            
            toastIcon.className = `fa ${icons[type] || icons.success}`;
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function showModal(title, message, confirmCallback = null) {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');
            const modalTitle = document.getElementById('modal-title');
            const modalMessage = document.getElementById('modal-message');
            const modalConfirm = document.getElementById('modal-confirm');
            
            modalTitle.textContent = title;
            modalMessage.textContent = message;
            
            modalConfirm.onclick = () => {
                if (confirmCallback) confirmCallback();
                closeModal();
            };
            
            modal.classList.remove('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-95');
            modalContent.classList.add('scale-100');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modal-content');
            
            modal.classList.add('opacity-0', 'pointer-events-none');
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
        }

        function formatDate(date) {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function copyToClipboard(text) {
            return new Promise((resolve, reject) => {
                if (navigator.clipboard) {
                    navigator.clipboard.writeText(text).then(resolve).catch(reject);
                } else {
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.left = '-9999px';
                    document.body.appendChild(textarea);
                    textarea.select();
                    try {
                        document.execCommand('copy');
                        resolve();
                    } catch (err) {
                        reject(err);
                    }
                    document.body.removeChild(textarea);
                }
            });
        }

        function downloadFile(content, filename, type = 'text/plain') {
            const blob = new Blob([content], { type });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function parseSRT(srtText) {
            const regex = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n\n|\n$)/g;
            const subtitles = [];
            let match;
            
            while ((match = regex.exec(srtText)) !== null) {
                subtitles.push({
                    index: parseInt(match[1]),
                    startTime: match[2],
                    endTime: match[3],
                    text: match[4].trim()
                });
            }
            
            return subtitles;
        }

        function formatSRT(subtitles) {
            return subtitles.map(sub => 
                `${sub.index}\n${sub.startTime} --> ${sub.endTime}\n${sub.text}\n`
            ).join('\n');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        class StorageManager {
            constructor() {
                this.initDefaultData();
            }

            initDefaultData() {
                if (!this.getMemory()) {
                    this.setMemory([]);
                }
                if (!this.getCorpus()) {
                    this.setCorpus([
                        { id: '1', source: 'API', target: '应用程序接口', industry: 'it' },
                        { id: '2', source: 'SDK', target: '软件开发工具包', industry: 'it' },
                        { id: '3', source: 'UI', target: '用户界面', industry: 'it' },
                        { id: '4', source: 'AI', target: '人工智能', industry: 'it' },
                        { id: '5', source: 'Database', target: '数据库', industry: 'it' },
                        { id: '6', source: 'Algorithm', target: '算法', industry: 'it' },
                        { id: '7', source: 'Machine Learning', target: '机器学习', industry: 'it' },
                        { id: '8', source: 'Cloud Computing', target: '云计算', industry: 'it' },
                        { id: '9', source: 'COVID-19', target: '新冠病毒', industry: 'medical' },
                        { id: '10', source: 'Vaccine', target: '疫苗', industry: 'medical' },
                        { id: '11', source: 'Doctor', target: '医生', industry: 'medical' },
                        { id: '12', source: 'Patient', target: '患者', industry: 'medical' },
                        { id: '13', source: 'Online Course', target: '在线课程', industry: 'education' },
                        { id: '14', source: 'E-learning', target: '电子学习', industry: 'education' },
                        { id: '15', source: 'Teacher', target: '教师', industry: 'education' }
                    ]);
                }
                if (!this.getApiConfig()) {
                    this.setApiConfig({
                        appId: '',
                        key: '',
                        apiType: 'baidu'
                    });
                }
            }

            getMemory() {
                try {
                    const data = localStorage.getItem(STORAGE_KEYS.MEMORY);
                    return data ? JSON.parse(data) : null;
                } catch (e) {
                    console.error('Failed to get memory:', e);
                    return [];
                }
            }

            setMemory(data) {
                try {
                    localStorage.setItem(STORAGE_KEYS.MEMORY, JSON.stringify(data));
                } catch (e) {
                    console.error('Failed to set memory:', e);
                }
            }

            addMemoryItem(item) {
                const memory = this.getMemory();
                const newItem = {
                    ...item,
                    id: generateId(),
                    timestamp: Date.now()
                };
                memory.unshift(newItem);
                this.setMemory(memory);
                return newItem;
            }

            removeMemoryItem(id) {
                const memory = this.getMemory();
                const filtered = memory.filter(item => item.id !== id);
                this.setMemory(filtered);
            }

            clearMemory() {
                this.setMemory([]);
            }

            searchMemory(query, sourceLang, targetLang) {
                const memory = this.getMemory();
                return memory.filter(item => {
                    const matchesQuery = !query || 
                        item.source.toLowerCase().includes(query.toLowerCase()) ||
                        item.target.toLowerCase().includes(query.toLowerCase());
                    const matchesLang = (!sourceLang || item.sourceLang === sourceLang) &&
                                       (!targetLang || item.targetLang === targetLang);
                    return matchesQuery && matchesLang;
                });
            }

            getMemoryBySource(source, sourceLang, targetLang) {
                const memory = this.getMemory();
                return memory.find(item => 
                    item.source === source && 
                    item.sourceLang === sourceLang && 
                    item.targetLang === targetLang
                );
            }

            getCorpus() {
                try {
                    const data = localStorage.getItem(STORAGE_KEYS.CORPUS);
                    return data ? JSON.parse(data) : null;
                } catch (e) {
                    console.error('Failed to get corpus:', e);
                    return [];
                }
            }

            setCorpus(data) {
                try {
                    localStorage.setItem(STORAGE_KEYS.CORPUS, JSON.stringify(data));
                } catch (e) {
                    console.error('Failed to set corpus:', e);
                }
            }

            addCorpusItem(item) {
                const corpus = this.getCorpus();
                const newItem = {
                    ...item,
                    id: generateId()
                };
                corpus.push(newItem);
                this.setCorpus(corpus);
                return newItem;
            }

            updateCorpusItem(id, updatedItem) {
                const corpus = this.getCorpus();
                const index = corpus.findIndex(item => item.id === id);
                if (index !== -1) {
                    corpus[index] = { ...corpus[index], ...updatedItem };
                    this.setCorpus(corpus);
                    return corpus[index];
                }
                return null;
            }

            removeCorpusItem(id) {
                const corpus = this.getCorpus();
                const filtered = corpus.filter(item => item.id !== id);
                this.setCorpus(filtered);
            }

            clearCorpus() {
                this.setCorpus([]);
            }

            searchCorpus(query, industry) {
                const corpus = this.getCorpus();
                return corpus.filter(item => {
                    const matchesQuery = !query || 
                        item.source.toLowerCase().includes(query.toLowerCase()) ||
                        item.target.toLowerCase().includes(query.toLowerCase());
                    const matchesIndustry = !industry || item.industry === industry;
                    return matchesQuery && matchesIndustry;
                });
            }

            getCorpusBySource(source) {
                const corpus = this.getCorpus();
                return corpus.find(item => item.source.toLowerCase() === source.toLowerCase());
            }

            replaceCorpusTerms(text) {
                const corpus = this.getCorpus();
                let result = text;
                
                corpus.forEach(item => {
                    const regex = new RegExp(item.source, 'gi');
                    result = result.replace(regex, item.target);
                });
                
                return result;
            }

            getApiConfig() {
                try {
                    const data = localStorage.getItem(STORAGE_KEYS.API_CONFIG);
                    return data ? JSON.parse(data) : null;
                } catch (e) {
                    console.error('Failed to get API config:', e);
                    return null;
                }
            }

            setApiConfig(config) {
                try {
                    localStorage.setItem(STORAGE_KEYS.API_CONFIG, JSON.stringify(config));
                } catch (e) {
                    console.error('Failed to set API config:', e);
                }
            }
        }

        const storage = new StorageManager();

        class TranslationAPI {
            constructor() {
                this.config = storage.getApiConfig();
            }

            updateConfig() {
                this.config = storage.getApiConfig();
            }

            async translate(text, sourceLang, targetLang) {
                this.updateConfig();

                if (sourceLang === targetLang) {
                    return { translatedText: text, from: 'same-lang' };
                }

                const apiType = this.config.apiType || 'auto';
                
                switch (apiType) {
                    case 'openai':
                        if (this.config.key) {
                            return await this.translateWithOpenAI(text, sourceLang, targetLang);
                        }
                        return await this.translateWithMyMemory(text, sourceLang, targetLang);
                    
                    case 'deepseek':
                        if (this.config.key) {
                            return await this.translateWithDeepSeek(text, sourceLang, targetLang);
                        }
                        return await this.translateWithMyMemory(text, sourceLang, targetLang);
                    
                    case 'doubao':
                        if (this.config.key) {
                            return await this.translateWithDoubao(text, sourceLang, targetLang);
                        }
                        return await this.translateWithMyMemory(text, sourceLang, targetLang);
                    
                    case 'baidu':
                        if (this.config.appId && this.config.key) {

            async translateWithMyMemory(text, sourceLang, targetLang) {
                const url = 'https://api.mymemory.translated.net/get';
                
                try {
                    const response = await fetch(`${url}?q=${encodeURIComponent(text)}&langpair=${sourceLang}|${targetLang}`);
                    const data = await response.json();

                    if (data.responseData && data.responseData.translatedText) {
                        return {
                            translatedText: data.responseData.translatedText,
                            from: 'api',
                            confidence: data.responseData.match || 0.8
                        };
                    } else {
                        throw new Error('翻译失败，返回数据异常');
                    }
                } catch (error) {
                    console.error('MyMemory API error:', error);
                    throw new Error('翻译服务暂时不可用，请稍后重试');

            }

                    url = proxyUrl + url.replace('https://', '/');

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${this.config.key}`
                        },
                        body: JSON.stringify({

                            }],

                    if (data.choices && data.choices.length > 0) {

            async translateWithBaidu(text, sourceLang, targetLang) {
                const baiduSource = this.getBaiduLangCode(sourceLang);
                const baiduTarget = this.getBaiduLangCode(targetLang);

                const salt = Date.now().toString();
                const sign = this.generateSign(text, salt);

                const url = `https://fanyi-api.baidu.com/api/trans/vip/translate`;

                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    const callbackName = `translateCallback_${Date.now()}`;

                    window[callbackName] = (response) => {
                        document.body.removeChild(script);
                        delete window[callbackName];

                        if (response.error_code) {
                            const errorMsg = this.getErrorMessage(response.error_code);
                            reject(new Error(errorMsg));
                        } else if (response.trans_result && response.trans_result.length > 0) {
                            const result = response.trans_result[0].dst;
                            resolve({ translatedText: result, from: 'api' });
                        } else {
                            reject(new Error('翻译失败，返回数据异常'));
                        }
                    };

                    const params = new URLSearchParams({
                        q: text,
                        from: baiduSource,
                        to: baiduTarget,
                        appid: this.config.appId,
                        salt: salt,
                        sign: sign
                    });

                    script.src = `${url}?${params.toString()}&callback=${callbackName}`;
                    script.onerror = () => {
                        document.body.removeChild(script);
                        delete window[callbackName];
                        reject(new Error('百度API请求失败，建议切换到默认翻译服务'));
                    };

                    document.body.appendChild(script);

                    setTimeout(() => {
                        if (window[callbackName]) {
                            document.body.removeChild(script);
                            delete window[callbackName];
                            reject(new Error('请求超时，请重试'));
                        }
                    }, 15000);
                });
            }

            getLangName(code) {
                const map = {
                    'zh': 'Chinese',
                    'en': 'English',
                    'ja': 'Japanese',
                    'ko': 'Korean'
                };
                return map[code] || code;
            }

            getBaiduLangCode(lang) {
                const map = {
                    'zh': 'zh',
                    'en': 'en',
                    'ja': 'jp',
                    'ko': 'kor'
                };
                return map[lang] || lang;
            }

            generateSign(text, salt) {
                const { appId, key } = this.config;
                const str = `${appId}${text}${salt}${key}`;
                return this.md5(str);
            }

            md5(string) {
                const table = [
                    0xd76aa478, 0xe8c7b756, 0x242070db, 0xc1bdceee,
                    0xf57c0faf, 0x4787c62a, 0xa8304613, 0xfd469501,

                    0x6b901122, 0xfd987193, 0xa679438e, 0x49b40821,
                    0xf61e2562, 0xc040b340, 0x265e5a51, 0xe9b6c7aa,
                    0xd62f105d, 0x02441453, 0xd8a1e681, 0xe7d3fbc8,
                    0x21e1cde6, 0xc33707d6, 0xf4d50d87, 0x455a14ed,
                    0xa9e3e905, 0xfcefa3f8, 0x676f02d9, 0x8d2a4c8a,
                    0xfffa3942, 0x8771f681, 0x6d9d6122, 0xfde5380c,
                    0xa4beea44, 0x4bdecfa9, 0xf6bb4b60, 0xbebfbc70,
                    0x289b7ec6, 0xeaa127fa, 0xd4ef3085, 0x04881d05,
                    0xd9d4d039, 0xe6db99e5, 0x1fa27cf8, 0xc4ac5665,
                    0xf4292244, 0x432aff97, 0xab9423a7, 0xfc93a039,
                    0x655b59c3, 0x8f0ccc92, 0xffeff47d, 0x85845dd1,
                    0x6fa87e4f, 0xfe2ce6e0, 0xa3014314, 0x4e0811a1,
                    0xf7537e82, 0xbd3af235, 0x2ad7d2bb, 0xeb86d391
                ];

                const s = [
                    7, 12, 17, 22, 7, 12, 17, 22, 7, 12, 17, 22, 7, 12, 17, 22,
                    5, 9, 14, 20, 5, 9, 14, 20, 5, 9, 14, 20, 5, 9, 14, 20,
                    4, 11, 16, 23, 4, 11, 16, 23, 4, 11, 16, 23, 4, 11, 16, 23,
                    6, 10, 15, 21, 6, 10, 15, 21, 6, 10, 15, 21, 6, 10, 15, 21
                ];

                const add = (x, y) => {
                    const lsw = (x & 0xFFFF) + (y & 0xFFFF);
                    const msw = (x >> 16) + (y >> 16) + (lsw >> 16);
                    return (msw << 16) | (lsw & 0xFFFF);
                };

                const rotateLeft = (x, n) => (x << n) | (x >>> (32 - n));

                const F = (x, y, z) => (x & y) | (~x & z);
                const G = (x, y, z) => (x & z) | (y & ~z);
                const H = (x, y, z) => x ^ y ^ z;
                const I = (x, y, z) => y ^ (x | ~z);

                const FF = (a, b, c, d, x, s, ac) => add(rotateLeft(add(add(a, F(b, c, d)), add(x, ac)), s), b);
                const GG = (a, b, c, d, x, s, ac) => add(rotateLeft(add(add(a, G(b, c, d)), add(x, ac)), s), b);
                const HH = (a, b, c, d, x, s, ac) => add(rotateLeft(add(add(a, H(b, c, d)), add(x, ac)), s), b);
                const II = (a, b, c, d, x, s, ac) => add(rotateLeft(add(add(a, I(b, c, d)), add(x, ac)), s), b);

                const toWordArray = (str) => {
                    const words = [];
                    let i = 0;
                    for (; i < str.length * 8; i += 8) {
                        words[i >> 5] |= (str.charCodeAt(i / 8) & 0xFF) << (i % 32);
                    }
                    words[i >> 5] |= 0x80 << (i % 32);
                    words[(((i + 64) >>> 9) << 4) + 14] = str.length * 8;
                    return words;
                };

                const wordToHex = (lValue) => {
                    let wordToHexValue = '';
                    const hexValue = '0123456789abcdef';
                    for (let i = 0; i < 4; i++) {
                        wordToHexValue += hexValue.charAt((lValue >> (i * 8 + 4)) & 0x0F);
                        wordToHexValue += hexValue.charAt((lValue >> (i * 8)) & 0x0F);
                    }
                    return wordToHexValue;
                };

                let a = 0x67452301;
                let b = 0xEFCDAB89;
                let c = 0x98BADCFE;
                let d = 0x10325476;

                const x = toWordArray(string);

                for (let i = 0; i < x.length; i += 16) {
                    const aa = a;
                    const bb = b;
                    const cc = c;
                    const dd = d;

                    c = FF(c, d, a, b, x[i + 2], s[2], table[2]);
                    b = FF(b, c, d, a, x[i + 3], s[3], table[3]);
                    a = FF(a, b, c, d, x[i + 4], s[4], table[4]);
                    d = FF(d, a, b, c, x[i + 5], s[5], table[5]);
                    c = FF(c, d, a, b, x[i + 6], s[6], table[6]);
                    b = FF(b, c, d, a, x[i + 7], s[7], table[7]);
                    a = FF(a, b, c, d, x[i + 8], s[8], table[8]);
                    d = FF(d, a, b, c, x[i + 9], s[9], table[9]);
                    c = FF(c, d, a, b, x[i + 10], s[10], table[10]);
                    b = FF(b, c, d, a, x[i + 11], s[11], table[11]);
                    a = FF(a, b, c, d, x[i + 12], s[12], table[12]);
                    d = FF(d, a, b, c, x[i + 13], s[13], table[13]);
                    c = FF(c, d, a, b, x[i + 14], s[14], table[14]);
                    b = FF(b, c, d, a, x[i + 15], s[15], table[15]);

                    a = GG(a, b, c, d, x[i + 1], s[16], table[16]);
                    d = GG(d, a, b, c, x[i + 6], s[17], table[17]);
                    c = GG(c, d, a, b, x[i + 11], s[18], table[18]);
                    b = GG(b, c, d, a, x[i], s[19], table[19]);
                    a = GG(a, b, c, d, x[i + 5], s[20], table[20]);
                    d = GG(d, a, b, c, x[i + 10], s[21], table[21]);
                    c = GG(c, d, a, b, x[i + 15], s[22], table[22]);
                    b = GG(b, c, d, a, x[i + 4], s[23], table[23]);
                    a = GG(a, b, c, d, x[i + 9], s[24], table[24]);
                    d = GG(d, a, b, c, x[i + 14], s[25], table[25]);
                    c = GG(c, d, a, b, x[i + 3], s[26], table[26]);
                    b = GG(b, c, d, a, x[i + 8], s[27], table[27]);
                    a = GG(a, b, c, d, x[i + 13], s[28], table[28]);
                    d = GG(d, a, b, c, x[i + 2], s[29], table[29]);
                    c = GG(c, d, a, b, x[i + 7], s[30], table[30]);
                    b = GG(b, c, d, a, x[i + 12], s[31], table[31]);

                    a = HH(a, b, c, d, x[i + 5], s[32], table[32]);
                    d = HH(d, a, b, c, x[i + 8], s[33], table[33]);
                    c = HH(c, d, a, b, x[i + 11], s[34], table[34]);
                    b = HH(b, c, d, a, x[i + 14], s[35], table[35]);
                    a = HH(a, b, c, d, x[i + 1], s[36], table[36]);
                    d = HH(d, a, b, c, x[i + 4], s[37], table[37]);
                    c = HH(c, d, a, b, x[i + 7], s[38], table[38]);
                    b = HH(b, c, d, a, x[i + 10], s[39], table[39]);
                    a = HH(a, b, c, d, x[i + 13], s[40], table[40]);
                    d = HH(d, a, b, c, x[i], s[41], table[41]);
                    c = HH(c, d, a, b, x[i + 3], s[42], table[42]);
                    b = HH(b, c, d, a, x[i + 6], s[43], table[43]);
                    a = HH(a, b, c, d, x[i + 9], s[44], table[44]);
                    d = HH(d, a, b, c, x[i + 12], s[45], table[45]);
                    c = HH(c, d, a, b, x[i + 15], s[46], table[46]);
                    b = HH(b, c, d, a, x[i + 2], s[47], table[47]);

                    a = II(a, b, c, d, x[i], s[48], table[48]);
                    d = II(d, a, b, c, x[i + 7], s[49], table[49]);
                    c = II(c, d, a, b, x[i + 14], s[50], table[50]);
                    b = II(b, c, d, a, x[i + 5], s[51], table[51]);
                    a = II(a, b, c, d, x[i + 12], s[52], table[52]);
                    d = II(d, a, b, c, x[i + 3], s[53], table[53]);
                    c = II(c, d, a, b, x[i + 10], s[54], table[54]);
                    b = II(b, c, d, a, x[i + 1], s[55], table[55]);
                    a = II(a, b, c, d, x[i + 8], s[56], table[56]);
                    d = II(d, a, b, c, x[i + 15], s[57], table[57]);
                    c = II(c, d, a, b, x[i + 6], s[58], table[58]);

            const targetText = document.getElementById('translate-output');

            sourceSelect.value = targetSelect.value;
            targetSelect.value = tempLang;

            const tempText = sourceText.value;
            sourceText.value = targetText.textContent === '翻译结果将显示在这里...' ? '' : targetText.textContent;

        async function copyTranslation() {
            const output = document.getElementById('translate-output').textContent;
            
            if (!output || output === '翻译结果将显示在这里...') {
                showToast('没有可复制的内容', 'warning');
                return;
            }

            try {
                await copyToClipboard(output);
                showToast('译文已复制到剪贴板', 'success');
            } catch (err) {
                showToast('复制失败，请手动复制', 'error');
            }
        }

        async function doTranslate() {
            const input = document.getElementById('translate-input').value.trim();
            const sourceLang = document.getElementById('translate-source-lang').value;
            const targetLang = document.getElementById('translate-target-lang').value;
            const btn = document.getElementById('translate-btn');
            const status = document.getElementById('translate-status');
            const statusText = document.getElementById('status-text');
            const output = document.getElementById('translate-output');

            if (!input) {
                showToast('请输入需要翻译的文本', 'warning');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fa fa-spinner fa-spin"></i> 翻译中...`;
            status.classList.remove('hidden');

            try {
                const result = await translateWithPriority(input, sourceLang, targetLang);
                
                statusText.textContent = `翻译完成（来源：${getTranslationSourceLabel(result.from)}）`;
                output.innerHTML = `<div class="whitespace-pre-wrap text-gray-800">${escapeHtml(result.translatedText)}</div>`;

                if (result.from !== 'memory') {
                    storage.addMemoryItem({
                        source: input,
                        target: result.translatedText,
                        sourceLang,
                        targetLang
                    });
                }

                showToast('翻译成功', 'success');

            } catch (error) {
                statusText.textContent = '翻译失败';
                output.innerHTML = `<div class="text-red-500 text-center h-full flex items-center justify-center">${escapeHtml(error.message)}</div>`;
                showToast(error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa fa-language"></i> 开始翻译`;
                updateStats();
            }
        }

        async function translateWithPriority(text, sourceLang, targetLang) {
            const corpusResult = storage.replaceCorpusTerms(text);
            
            const memoryMatch = storage.getMemoryBySource(text, sourceLang, targetLang);
            if (memoryMatch) {
                return {
                    translatedText: storage.replaceCorpusTerms(memoryMatch.target),
                    from: 'memory'
                };
            }

            const apiResult = await api.translate(corpusResult, sourceLang, targetLang);
            
            return {
                translatedText: storage.replaceCorpusTerms(apiResult.translatedText),
                from: apiResult.from
            };
        }

                'api': 'MyMemory翻译API',
                'same-lang': '相同语言',
                'corpus': '专业语料库'

            return labels[source] || source;

        function importCorpus() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt,.csv';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    const content = event.target.result;
                    const lines = content.split('\n');
                    let importedCount = 0;

                    lines.forEach(line => {
                        line = line.trim();
                        if (!line || line.startsWith('#')) return;

                        const parts = line.split(/[,，\t]/);
                        if (parts.length >= 2) {
                            const source = parts[0].trim();
                            const target = parts[1].trim();
                            const industry = parts[2] ? parts[2].trim() : 'general';

                            if (source && target) {
                                storage.addCorpusItem({ source, target, industry });
                                importedCount++;
                            }
                        }
                    });

                    showToast(`成功导入 ${importedCount} 条术语`, 'success');
                    renderCorpusPage();
                };
                reader.readAsText(file, 'UTF-8');
            };
            input.click();
        }

        async function translateSubtitle() {
            const input = document.getElementById('subtitle-input').value;
            const sourceLang = document.getElementById('subtitle-source-lang').value;
            const targetLang = document.getElementById('subtitle-target-lang').value;
            const btn = document.getElementById('subtitle-translate-btn');

            if (!input.trim()) {
                showToast('请输入字幕内容', 'warning');
                return;
            }

            const subtitles = parseSRT(input);
            
            if (subtitles.length === 0) {
                showToast('无法识别字幕格式，请检查SRT格式是否正确', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fa fa-spinner fa-spin"></i> 翻译中...`;

            let translatedCount = 0;

            for (let i = 0; i < subtitles.length; i++) {
                try {
                    const result = await translateWithPriority(subtitles[i].text, sourceLang, targetLang);
                    subtitles[i].text = result.translatedText;
                    translatedCount++;
                    
                    document.getElementById('subtitle-output').value = formatSRT(subtitles);
                } catch (error) {
                    console.error(`翻译第 ${i + 1} 条字幕失败:`, error);
                }
            }

            btn.disabled = false;
            btn.innerHTML = `<i class="fa fa-language"></i> 一键翻译全部`;
            showToast(`成功翻译 ${translatedCount} 条字幕`, 'success');

            const timestamp = new Date().toISOString().slice(0, 19).replace(/:/g, '-');

        function triggerOcrUpload() {
            document.getElementById('ocr-file-input').click();
        }

        async function handleOcrFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const preview = document.getElementById('ocr-image-preview');
            const previewImg = document.getElementById('ocr-preview-img');
            const uploadArea = document.querySelector('#ocr-image-preview').previousElementSibling;
            
            uploadArea.classList.add('hidden');
            preview.classList.remove('hidden');
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                previewImg.src = e.target.result;
                
                showToast('正在识别图片文字...', 'info');
                
                try {
                    const lang = document.getElementById('ocr-source-lang').value;
                    const worker = await Tesseract.createWorker(lang);
                    const { data: { text } } = await worker.recognize(file);
                    await worker.terminate();
                    
                    document.getElementById('ocr-text').value = text;
                    showToast('文字识别完成', 'success');
                } catch (error) {
                    console.error('OCR识别失败:', error);
                    showToast('OCR识别失败，请重试', 'error');
                }
            };
            reader.readAsDataURL(file);
        }

            const preview = document.getElementById('ocr-image-preview');
            const uploadArea = document.querySelector('#ocr-image-preview').previousElementSibling;

        async function translateOcrText() {
            const text = document.getElementById('ocr-text').value.trim();
            const sourceLang = document.getElementById('ocr-source-lang').value;
            const targetLang = document.getElementById('ocr-target-lang').value;
            const btn = document.getElementById('ocr-translate-btn');

            if (!text) {
                showToast('请先上传图片或输入文字', 'warning');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i class="fa fa-spinner fa-spin"></i> 翻译中...`;

            try {
                let apiSourceLang = 'en';
                if (sourceLang.includes('chi')) apiSourceLang = 'zh';
                else if (sourceLang.includes('jpn')) apiSourceLang = 'ja';
                else if (sourceLang.includes('kor')) apiSourceLang = 'ko';

                const result = await translateWithPriority(text, apiSourceLang, targetLang);
                document.getElementById('ocr-translation').value = result.translatedText;
                showToast('翻译成功', 'success');
            } catch (error) {
                showToast(`翻译失败：${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i class="fa fa-language"></i> 翻译识别结果`;

        function triggerPptUpload() {
            document.getElementById('ppt-file-input').click();
        }

        async function handlePptFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            showToast('正在解析PPT文件...', 'info');

            try {
                const zip = new JSZip();
                const content = await zip.loadAsync(file);
                
                const texts = [];
                let slideCount = 0;

                for (const filename in content.files) {
                    if (filename.startsWith('ppt/slides/slide') && filename.endsWith('.xml')) {
                        slideCount++;
                        const xmlContent = await content.files[filename].async('string');
                        const text = extractTextFromXml(xmlContent);
                        if (text.trim()) {
                            texts.push(text);
                        }
                    }
                }

                document.getElementById('ppt-source-text').value = texts.join('\n\n---\n\n');
                document.getElementById('ppt-slide-count').textContent = `幻灯片数量: ${slideCount}`;
                document.getElementById('ppt-text-count').textContent = `文本段落: ${texts.length}`;
                document.getElementById('ppt-info').classList.remove('hidden');
                
                showToast(`成功提取 ${texts.length} 段文本`, 'success');
            } catch (error) {
                console.error('PPT解析失败:', error);
                showToast('PPT解析失败，请确保文件格式正确', 'error');
            }
        }

        function extractTextFromXml(xml) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(xml, 'text/xml');
            const textElements = doc.getElementsByTagName('a:t');
            const texts = [];
            
            for (let i = 0; i < textElements.length; i++) {
                const text = textElements[i].textContent;
                if (text && text.trim()) {
                    texts.push(text.trim());
                }
            }
            
            return texts.join('\n');
        }

            }
        }

        function navigateTo(page) {
            currentPage = page;
            
            document.querySelectorAll('.nav-btn, .mobile-nav-btn').forEach(btn => {
                btn.classList.remove('btn-gradient', 'text-white', 'shadow-lg', 'shadow-primary/20', 'bg-indigo-50', 'text-primary');
                btn.classList.add('text-gray-600', 'hover:bg-indigo-50', 'hover:text-primary');
            });
            
            const activeBtn = document.getElementById(`nav-${page}`);
            if (activeBtn) {
                activeBtn.classList.remove('text-gray-600', 'hover:bg-indigo-50', 'hover:text-primary');
                activeBtn.classList.add('btn-gradient', 'text-white', 'shadow-lg', 'shadow-primary/20');
            }
    
            const mobileActiveBtn = document.getElementById(`mobile-nav-${page}`);
            if (mobileActiveBtn) {
                mobileActiveBtn.classList.remove('text-gray-600', 'hover:bg-gray-100');
                mobileActiveBtn.classList.add('bg-indigo-50', 'text-primary');
            }
    
            renderPage(page);
            
            window.history.pushState({ page }, '', `#${page}`);
        }
        
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }
        
        function renderPage(page) {
            const container = document.getElementById('page-content');
            container.style.opacity = '0';
            container.style.transform = 'translateY(10px)';

            setTimeout(() => {
                switch (page) {
                    case 'translate':
                        renderTranslatePage();
                        break;
                    case 'memory':
                        renderMemoryPage();
                        break;
                    case 'corpus':
                        renderCorpusPage();
                        break;
                    case 'subtitle':
                        renderSubtitlePage();
                        break;
                    case 'ocr':
                        renderOcrPage();
                        break;
                    case 'ppt':
                        renderPptPage();
                        break;
                    case 'api':
                        renderApiPage();
                        break;
                    default:
                        renderTranslatePage();
                }

                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 150);
        }

        window.addEventListener('load', () => {
            const hash = window.location.hash.slice(1) || 'translate';
            navigateTo(hash);
        });

        window.addEventListener('popstate', (event) => {
            if (event.state && event.state.page) {
                navigateTo(event.state.page);
            }
        });
    </script>
